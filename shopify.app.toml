# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "8fc98a55cd37bbf33edfbda31d8234d6"
name = "PromoNexAI_App"
application_url = "https://sa.promonexai.com/"
embedded = true

[webhooks]
api_version = "2026-01"

# Mandatory compliance webhooks (required for App Store)
[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "https://sa.promonexai.com/webhooks/compliance"

# Handled by: app/routes/webhooks.app.uninstalled.tsx
[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "https://sa.promonexai.com/webhooks/app/uninstalled"

# Handled by: app/routes/webhooks.app.scopes_update.tsx
[[webhooks.subscriptions]]
topics = ["app/scopes_update"]
uri = "https://sa.promonexai.com/webhooks/app/scopes_update"

# Billing lifecycle (accept / decline / cancel / reinstall). Handled by: app/routes/webhooks.app.subscriptions.tsx
[[webhooks.subscriptions]]
topics = ["app_subscriptions/update", "app_purchases_one_time/update"]
uri = "https://sa.promonexai.com/webhooks/app/subscriptions"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://sa.promonexai.com/auth/callback",
  "https://sa.promonexai.com/auth/sa/callback"
]
