client_id = "8fc98a55cd37bbf33edfbda31d8234d6"
name = "PromoNexAI_App"
application_url = "https://sa.promonexai.com/"
embedded = true

[webhooks]
api_version = "2026-01"

# Mandatory compliance webhooks (required for App Store)
[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "https://sa.promonexai.com/webhooks/compliance"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://sa.promonexai.com/auth/callback",
  "https://sa.promonexai.com/auth/sa/callback"
]
